{% extends "storefront/base.html" %}

{% block title %}Entrar - Loja{% endblock %}

{% block content %}
<div class="max-w-sm mx-auto bg-white rounded-lg shadow p-8">
    <h1 class="text-2xl font-bold mb-6">Entrar</h1>

    {% if form.errors %}
        <p class="bg-red-100 text-red-800 px-4 py-3 rounded mb-4">
            Usuário ou senha inválidos.
        </p>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <div class="mb-4">
            <label class="block text-sm mb-1" for="{{ form.username.id_for_label }}">Usuário</label>
            <input type="text" name="username" id="{{ form.username.id_for_label }}" required
                   class="w-full border rounded px-3 py-2">
        </div>
        <div class="mb-6">
            <label class="block text-sm mb-1" for="{{ form.password.id_for_label }}">Senha</label>
            <input type="password" name="password" id="{{ form.password.id_for_label }}" required
                   class="w-full border rounded px-3 py-2">
        </div>
        <input type="hidden" name="next" value="{{ next }}">
        <button type="submit"
                class="w-full bg-indigo-600 text-white rounded px-4 py-2 font-semibold hover:bg-indigo-700">
            Entrar
        </button>
    </form>
</div>
{% endblock %}
